<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title shown in Google results -->
  <title>GitLint — See your GitHub the way recruiters do</title>

  <!-- Description shown under title in Google results -->
  <meta name="description"
    content="GitLint analyzes your GitHub profile across 6 recruiter-relevant signals and generates a blind spot report. Find out exactly what recruiters see when they look at your GitHub." />

  <!-- Keywords (less important now but still good) -->
  <meta name="keywords"
    content="GitHub profile analyzer, recruiter score, GitHub audit, developer portfolio, GitLint" />

  <!-- Open Graph — how it looks when shared on WhatsApp/LinkedIn -->
  <meta property="og:title" content="GitLint — GitHub Profile Audit Tool" />
  <meta property="og:description"
    content="See your GitHub the way recruiters do. Get scored across 6 signals and find your blind spots." />
  <meta property="og:url" content="https://gitlint-scorer.netlify.app" />
  <meta property="og:type" content="website" />

  <!-- Twitter/X card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="GitLint — GitHub Profile Audit Tool" />
  <meta name="twitter:description" content="See your GitHub the way recruiters do." />

  <link rel="icon" type="image/png" href="/logo.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
